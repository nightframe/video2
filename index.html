<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxPlay · profesional video player</title>
  <!-- Font modern (Inter) untuk estetika -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET PROFESIONAL ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: linear-gradient(145deg, #0c111c 0%, #1a1f30 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Card player premium */
    .video-container {
      width: 100%;
      max-width: 1000px;
      background: rgba(20, 25, 35, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.2rem;
      padding: 1.2rem;
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.25s ease;
    }

    .video-container:hover {
      box-shadow: 0 35px 60px -12px #000000, 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
      border-color: rgba(255, 215, 0, 0.1);
    }

    /* Video dengan sudut lembut */
    video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 1.5rem;
      background: #0b0e14;
      box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.03);
      outline: none;
    }

    /* Footer elegan tanpa info sumber */
    .player-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.9rem;
      padding: 0 0.5rem;
      color: #9aa8c9;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .brand-icon {
      width: 24px;
      height: 24px;
      background: rgba(255, 215, 0, 0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffd966;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .badge {
      background: rgba(255, 255, 255, 0.02);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 215, 0, 0.1);
      color: #ccd6f0;
      font-weight: 400;
      font-size: 0.75rem;
      backdrop-filter: blur(4px);
    }

    /* status player (hanya ikon, tanpa url) */
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #4caf92;
      border-radius: 50%;
      box-shadow: 0 0 10px #4caf92;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); background: #6bcfb0; }
      100% { opacity: 0.8; transform: scale(1); }
    }

    /* Tidak ada info sumber sama sekali — hanya desain */
  </style>
</head>
<body>

  <!-- pembungkus profesional -->
  <div class="video-container">
    <div class="video-wrapper" style="width:100%;"> <!-- wrapper asli tetap ada -->
      <video
        id="myVideo"
        src="https://cdn.videy.co/n2i3MQQt1.mp4"
        controls
        playsinline
        preload="metadata"
      ></video>
    </div>
    
    <!-- footer tanpa sumber video (hanya elemen visual) -->
    <div class="player-footer">
      <div class="brand">
        <span class="brand-icon">▶</span>
        <span>VoxStream · studio</span>
      </div>
      <div class="status-indicator">
        <span class="dot"></span>
        <span class="badge">siap putar</span>
      </div>
    </div>
  </div>

  <!-- ===== KODE ASLI (PERTAMA) — MENGUBAH SRC VIDEO ===== -->
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const videoURL = params.get("u");
      if(videoURL){
        document.getElementById("myVideo").src = videoURL;
      }
    })();
  </script>

  <!-- ===== KODE ASLI (KEDUA) — TRIGGER IKLAN ===== -->
  <script>
    (function(){
      /* ================= CONFIG ================= */
      const ENCODED_LINK =
      "aHR0cHM6Ly93d3cuZWZmZWN0aXZlZ2F0ZWNwbS5jb20vYjUxZzN5M3ZyP2tleT01OWZlMWM1ZGJlY2U3NzQ4ODFkY2YzMzNlM2I1OTgzZA==";
      /* =========================================== */
      const video = document.getElementById("myVideo");
      let adsTriggered = false;
      /* Decode link */
      function getLink(){
        try{
          return atob(ENCODED_LINK);
        }catch(e){
          return "https://www.effectivegatecpm.com/b51g3y3vr?key=59fe1c5dbece774881dcf333e3b5983d";
        }
      }
      /* Open ad safely */
      function openAd(){
        if(adsTriggered) return;
        adsTriggered = true;
        const link = getLink();
        const popup = window.open(link,'_blank');
        if(!popup || popup.closed || typeof popup.closed==='undefined'){
            adsTriggered = false;
        }
      }
      /* ========= HYBRID TRIGGER SYSTEM ========= */
      video.addEventListener('play', openAd, {once:true});
      video.addEventListener('click', openAd, {once:true});
      video.addEventListener('touchend', openAd, {once:true});
      video.addEventListener('keydown', openAd, {once:true});
    })();
  </script>

  <!-- tidak ada script tambahan yang menampilkan sumber video -->
</body>
</html>
